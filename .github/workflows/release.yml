name: Release

on:
  push:
    tags: ['v*']

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore Bowire.Protocol.TacticalApi.slnx

      - name: Build & Test
        run: |
          dotnet build Bowire.Protocol.TacticalApi.slnx -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}
          dotnet test Bowire.Protocol.TacticalApi.slnx -c Release --no-build -v normal

      - name: Pack
        run: dotnet pack Bowire.Protocol.TacticalApi.slnx -c Release --no-build -o artifacts/packages -p:Version=${{ steps.version.outputs.VERSION }}

      # Every tag publishes to both feeds, RCs included. SemVer's
      # `-rc.N` suffix marks them as pre-release on NuGet, so
      # consumers only receive them on explicit opt-in (the
      # `--prerelease` flag for `dotnet add package`, or a pinned
      # `Version="1.0.0-rc.1"`). Stable-restore paths are untouched.
      # Matches the Bowire main repo + Bowire.Protocol.Amqp policy.
      - name: Publish to GitHub Packages
        if: ${{ github.ref_type == 'tag' }}
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source "https://nuget.pkg.github.com/Kuestenlogik/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      # nuget.org: only when the secret is configured.
      # NUGET_API_KEY needs the 'Push new packages and package
      # versions' scope with glob 'KL.*'.
      - name: Publish to nuget.org
        if: ${{ github.ref_type == 'tag' && env.NUGET_API_KEY != '' }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        # No separate .snupkg push — Directory.Build.props sets
        # DebugType=embedded so debug info ships inside the .nupkg
        # itself. Avoids nuget.org's symbol-validation failures that
        # the Grpc.Tools side-PDBs were triggering.
        run: |
          dotnet nuget push "artifacts/packages/*.nupkg"             --source https://api.nuget.org/v3/index.json             --api-key "$NUGET_API_KEY"             --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-rc') }}
          files: artifacts/packages/*.nupkg
